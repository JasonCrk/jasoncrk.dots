unbind-key c
unbind-key C
unbind-key q

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind c new-window -n "terminal" -c "#{pane_current_path}"
bind n command-prompt -p "New window:" "new-window -n '%%' -c '#{pane_current_path}'"

bind O run-shell -b 'dir=#{q:pane_current_path}; \
  tmux new-window -n "agent.coder" -c "$dir"; \
  tmux split-window -h -p 75 -c "$dir"; \
  tmux select-pane -L; \
  tmux split-window -v -p 33 -c "$dir"; \
  tmux select-pane -U; \
  tmux split-window -v -p 50 -c "$dir"; \
  tmux select-pane -R; \
  tmux send-keys "opencode -c" C-m'

bind P run-shell -b 'dir=#{q:pane_current_path}; \
  tmux new-window -n "agent.coder" -c "$dir"; \
  tmux split-window -h -p 75 -c "$dir"; \
  tmux select-pane -L; \
  tmux split-window -v -p 33 -c "$dir"; \
  tmux select-pane -U; \
  tmux split-window -v -p 50 -c "$dir"; \
  tmux select-pane -R; \
  tmux send-keys "pi -c" C-m'

bind C run-shell -b 'dir=#{q:pane_current_path}; \
  tmux new-window -n "coder" -c "$dir"; \
  tmux split-window -v -p 20 -c "$dir"; \
  tmux split-window -h -p 66 -c "$dir"; \
  tmux split-window -h -p 50 -c "$dir"; \
  tmux send-keys -t 1 C-l; \
  tmux send-keys -t 2 C-l; \
  tmux send-keys -t 3 C-l; \
  tmux select-pane -t 1; \
  tmux send-keys "vim" C-m'

bind-key q display-popup -E -w 34 -h 3 "$HOME/.config/tmux/scripts/go-out.sh '#{client_tty}' '#{client_pid}'"
